version: '3.8'
services:

  mysql:
    image: mysql:8.4
    container_name: job-mail-scan-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: jobscan
      MYSQL_USER: jobscan
      MYSQL_PASSWORD: jobscan
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "jobscan", "-pjobscan"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: job-mail-scan:latest
    container_name: job-mail-scan
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - "SPRING_CONFIG_IMPORT=optional:configserver:"
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - MYSQL_HOST=mysql
      - MYSQL_DATABASE=jobscan
      - MYSQL_USER=jobscan
      - MYSQL_PASSWORD=jobscan
      - "JVM_OPTS=${JVM_OPTS:-}"
    env_file:
      - .env
    volumes:
      - ./data/tokens:/root/.credentials/job-mail-scan
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
